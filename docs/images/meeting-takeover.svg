<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" rx="12"/>

  <text x="480" y="48" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="26" font-weight="700">Human 接管会议：随时中断、改议题、结束</text>
  <text x="480" y="78" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15">会议在后台运行，human 通过命令队列插入控制，不阻塞 Agent 其他工作</text>

  <!-- Timeline -->
  <line x1="100" y1="180" x2="860" y2="180" stroke="#334155" stroke-width="4" stroke-linecap="round"/>

  <!-- Start -->
  <circle cx="140" cy="180" r="10" fill="#38bdf8"/>
  <text x="140" y="160" text-anchor="middle" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="13" font-weight="700">会议开始</text>

  <!-- Dev turn -->
  <rect x="220" y="210" width="180" height="50" rx="8" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
  <text x="310" y="240" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="14" font-weight="700">dev 发言中...</text>

  <!-- Human skip command -->
  <path d="M 380 235 L 460 235" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6,4" marker-end="url(#skipArrow)"/>
  <defs>
    <marker id="skipArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
  <g transform="translate(390, 170)">
    <rect width="120" height="36" rx="18" fill="#f59e0b"/>
    <text x="60" y="24" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="13" font-weight="700">skip_turn</text>
  </g>

  <!-- Writer turn skipped -->
  <rect x="520" y="210" width="180" height="50" rx="8" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="610" y="240" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="14" font-weight="700">writer 被跳过</text>

  <!-- Update topic -->
  <g transform="translate(720, 170)">
    <rect width="120" height="36" rx="18" fill="#8b5cf6"/>
    <text x="60" y="24" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">update_topic</text>
  </g>

  <!-- Free discussion -->
  <rect x="740" y="210" width="120" height="50" rx="8" fill="#38bdf8" opacity="0.15" stroke="#38bdf8" stroke-width="2"/>
  <text x="800" y="240" text-anchor="middle" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="14" font-weight="700">自由讨论</text>

  <!-- Human panel -->
  <g transform="translate(340, 360)">
    <rect width="280" height="110" rx="14" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="140" y="32" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Human 控制台</text>
    <rect x="30" y="50" width="60" height="30" rx="6" fill="#f59e0b"/>
    <text x="60" y="70" text-anchor="middle" fill="#0f172a" font-family="system-ui, sans-serif" font-size="12" font-weight="700">跳过</text>
    <rect x="110" y="50" width="60" height="30" rx="6" fill="#8b5cf6"/>
    <text x="140" y="70" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">改议题</text>
    <rect x="190" y="50" width="60" height="30" rx="6" fill="#ef4444"/>
    <text x="220" y="70" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">结束</text>
    <text x="140" y="96" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">命令进入队列，后台 meeting task 异步处理</text>
  </g>

  <text x="480" y="510" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="14">支持 skip_turn、update_topic、close 三条接管命令</text>
</svg>
