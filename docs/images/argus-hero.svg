<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="960" height="320" fill="url(#bg)" rx="12"/>
  <circle cx="480" cy="160" r="180" fill="url(#glow)"/>

  <!-- Central human -->
  <g transform="translate(430, 100)">
    <circle cx="50" cy="40" r="36" fill="#f59e0b" opacity="0.2"/>
    <text x="50" y="52" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="40">👤</text>
    <text x="50" y="110" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Human</text>
  </g>

  <!-- Agent nodes around -->
  <g transform="translate(160, 80)">
    <circle cx="40" cy="40" r="32" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
    <text x="40" y="50" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="28">🤖</text>
    <text x="40" y="100" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="14" font-weight="700">dev</text>
  </g>

  <g transform="translate(720, 80)">
    <circle cx="40" cy="40" r="32" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
    <text x="40" y="50" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="28">🤖</text>
    <text x="40" y="100" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="14" font-weight="700">writer</text>
  </g>

  <g transform="translate(230, 200)">
    <circle cx="40" cy="40" r="32" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
    <text x="40" y="50" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="28">🤖</text>
    <text x="40" y="100" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="14" font-weight="700">reviewer</text>
  </g>

  <g transform="translate(650, 200)">
    <circle cx="40" cy="40" r="32" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
    <text x="40" y="50" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="28">🤖</text>
    <text x="40" y="100" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="14" font-weight="700">pm</text>
  </g>

  <!-- Connecting lines -->
  <line x1="240" y1="120" x2="440" y2="140" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
  <line x1="760" y1="120" x2="490" y2="140" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
  <line x1="270" y1="240" x2="450" y2="180" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
  <line x1="690" y1="240" x2="470" y2="180" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="38" font-weight="800" letter-spacing="2">ARGUS</text>
  <text x="480" y="300" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="18">可观测、可接管、可继承的多 Agent 协作操作系统</text>
</svg>
